<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        p {
            margin: 8px 0;
        }
        img {
            display: block;
            margin: 15px auto;
            max-width: 150px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .boton {
            background-color: #3498db;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
        .boton:hover {
            background-color: #2980b9;
        }
        .acciones {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ producto['NOMBRE'] }}</h1>
        <p><strong>Código:</strong> {{ producto['CODIGO'] }}</p>
        <p><strong>Stock disponible:</strong> {{ producto['STOCK'] }}</p>
        <p><strong>Ubicación:</strong> {{ producto['UBICACION'] }}</p>

        <!-- QR del producto -->
        <img src="{{ url_for('static', filename=producto['QR_PATH']) }}" alt="QR del producto">

        <form method="POST">
            <label for="cantidad">Cantidad:</label>
            <input type="number" name="cantidad" value="1" min="1">

            <label for="ubicacion">Ubicación:</label>
            <input type="text" name="ubicacion" value="{{ producto['UBICACION'] }}">

            <button type="submit" class="boton">➕ Añadir a selección</button>
        </form>
    </div>

    <div class="acciones">
        <a href="{{ url_for('resumen') }}">📋 Ver resumen</a>
    </div>
     <div style="text-align:center; margin-top:20px;">
    <a href="{{ url_for('home') }}" 
       style="background:#3498db; color:#fff; padding:10px 16px; border-radius:6px; text-decoration:none; font-weight:bold;">
       🏠 Volver al inicio
</body>
</html>
