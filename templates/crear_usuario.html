<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Usuario</title>
    <style>
        body { font-family:"Segoe UI",Arial,sans-serif; background:#f4f6f8; padding:20px; }
        .card { background:#fff; border-radius:8px; padding:20px; max-width:400px; margin:20px auto; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        h1 { text-align:center; color:#2c3e50;}
        label { display:block; margin-top:10px; font-weight:bold;}
        input, select { width:100%; padding:8px; margin-top:5px; border-radius:4px; border:1px solid #ccc;}
        button { width:100%; padding:10px; margin-top:15px; background:#2ecc71; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold;}
        button:hover { background:#27ae60; }
        a { text-decoration:none; color:#3498db; display:block; margin-top:10px; text-align:center;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Crear Usuario</h1>
        <form method="POST">
            <label>Usuario:</label>
            <input type="text" name="username" required>

            <label>Contraseña:</label>
            <input type="text" name="password" required>

            <label>Rol:</label>
            <select name="rol">
                <option value="admin">Admin</option>
                <option value="operador">Operador</option>
            </select>

            <button type="submit">➕ Crear Usuario</button>
        </form>
        <a href="{{ url_for('home') }}">🏠 Volver al inicio</a>
    </div>
</body>
</html>
