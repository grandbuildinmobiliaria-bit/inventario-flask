<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar proyecto</title>
    <link rel="icon" href="{{ url_for('static', filename='mi_icono.ico') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px; }
        .card { background:#fff; max-width:700px; margin:20px auto; border-radius:10px; padding:24px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
        h1 { margin-top:0; color:#2c3e50; }
        .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .campo { margin-bottom:14px; }
        label { display:block; font-weight:bold; margin-bottom:6px; }
        input, select { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; }
        input[readonly] { background:#f8f9fa; color:#7f8c8d; }
        .botones { display:flex; gap:10px; margin-top:10px; }
        .boton { padding:10px 16px; border-radius:6px; text-decoration:none; border:none; cursor:pointer; font-weight:bold; }
        .primario { background:#f39c12; color:#fff; }
        .primario:hover { background:#d68910; }
        .secundario { background:#95a5a6; color:#fff; }
        .secundario:hover { background:#7f8c8d; }
        .mensaje { margin:10px 0; }
        .error { color:#e74c3c; font-weight:bold; }
        .success { color:#27ae60; font-weight:bold; }
        .warning { color:#f39c12; font-weight:bold; }
    </style>
</head>
<body>
    <div class="page">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
      <button type="button" class="theme-toggle" data-theme-toggle></button>
    </div>
    <div class="card">
        <h1>✏️ Editar proyecto</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mensaje">
                    {% for category, message in messages %}
                        <div class="{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="row">
                <div class="campo">
                    <label>Código proyecto</label>
                    <input type="text" name="codigo" value="{{ proyecto.codigo }}" readonly>
                </div>
                <div class="campo">
                    <label>Cliente</label>
                    <input type="text" name="cliente" value="{{ proyecto.cliente }}" required>
                </div>
            </div>

            <div class="campo">
                <label>Nombre del proyecto</label>
                <input type="text" name="nombre" value="{{ proyecto.nombre }}" required>
            </div>

            <div class="campo">
                <label>Drive Folder ID</label>
                <input type="text" name="drive_folder_id" value="{{ proyecto.drive_folder_id }}" required>
            </div>

            <div class="campo">
                <label>Estado</label>
                <select name="estado">
                    <option value="activo" {% if proyecto.estado == 'activo' %}selected{% endif %}>activo</option>
                    <option value="pausado" {% if proyecto.estado == 'pausado' %}selected{% endif %}>pausado</option>
                    <option value="cerrado" {% if proyecto.estado == 'cerrado' %}selected{% endif %}>cerrado</option>
                </select>
            </div>

            <div class="botones">
                <button type="submit" class="boton primario">💾 Guardar cambios</button>
                <a href="{{ url_for('proyectos') }}" class="boton secundario">⬅️ Volver</a>
            </div>
        </form>
    </div>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
