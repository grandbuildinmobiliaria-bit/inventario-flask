<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir producto</title>
    <link rel="icon" href="{{ url_for('static', filename='mi_icono.ico') }}">
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .boton {
            background-color: #3498db;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .boton:hover {
            background-color: #2980b9;
        }
        #reader {
            margin-top: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            height: 400px;
        }
        .acciones {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        #estadoScanner {
            text-align: center;
            color: #555;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="page">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
      <button type="button" class="theme-toggle" data-theme-toggle></button>
    </div>
    <h1>Añadir producto al resumen</h1>

    <!-- Opción búsqueda manual -->
    <div class="card">
        <form method="POST">
            <label>Familia:</label>
            <select name="familia" required>
                {% for f in familias %}
                    <option value="{{ f['codigo'] }}">{{ f['nombre'] }}</option>
                {% endfor %}
            </select>

            <label>Tipo:</label>
            <select name="tipo" required>
                {% for t in tipos %}
                    <option value="{{ t['codigo'] }}">{{ t['nombre'] }}</option>
                {% endfor %}
            </select>

            {% if productos %}
                <label>Producto:</label>
                <select name="producto" required>
                    {% for p in productos %}
                        <option value="{{ p['CODIGO'] }}">{{ p['CODIGO'] }} – {{ p['NOMBRE'] }}</option>
                    {% endfor %}
                </select>
                <button type="submit" class="boton">🔍 Ver producto</button>
            {% else %}
                <button type="submit" class="boton">🔍 Buscar productos</button>
            {% endif %}
        </form>
    </div>

    <!-- Opción escaneo QR con selección de cámara -->
    <div class="card">
        <h2>Escanear QR</h2>

        <label for="cameraSelect">Seleccionar cámara:</label>
        <select id="cameraSelect"></select>
        <button id="activarScannerBtn" class="boton">📷 Activar escáner QR</button>
        <p id="estadoScanner">Escáner apagado</p>

        <div id="reader"></div>

        <form id="qrForm" method="POST" style="display:none;">
            <input type="hidden" id="codigoQR" name="codigo" />
        </form>
    </div>

    <div class="acciones">
        <a href="{{ url_for('resumen') }}">📋 Ver resumen</a>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <a href="{{ url_for('home') }}" 
           style="background:#3498db; color:#fff; padding:10px 16px; border-radius:6px; text-decoration:none; font-weight:bold;">
           🏠 Volver al inicio
        </a>
    </div>

    <script>
        let html5QrcodeScanner;
        let escaneado = false;
        const estadoScanner = document.getElementById("estadoScanner");

        navigator.mediaDevices.enumerateDevices()
        .then(devices => {
            const videoDevices = devices.filter(d => d.kind === "videoinput");
            const cameraSelect = document.getElementById("cameraSelect");
            videoDevices.forEach((device, i) => {
                const option = document.createElement("option");
                option.value = device.deviceId;
                option.text = device.label || `Cámara ${i+1}`;
                cameraSelect.appendChild(option);
            });
            console.log("Cámaras listadas:", videoDevices.length);
        })
        .catch(err => {
            console.error("Error al enumerar cámaras:", err);
            estadoScanner.textContent = "❌ No se pudieron listar las cámaras";
        });

        document.getElementById("activarScannerBtn").addEventListener("click", function() {
            const cameraId = document.getElementById("cameraSelect").value;
            console.log("Botón activar cámara presionado, cámara seleccionada:", cameraId);

            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
                console.log("Instancia html5QrcodeScanner creada");
            }

            const config = { fps: 10, qrbox: 250 };
            const constraints = { deviceId: { exact: cameraId } };

            html5QrcodeScanner.start(
                constraints,
                config,
                (decodedText, decodedResult) => {
                    if (escaneado) return;
                    escaneado = true;

                    let codigo = decodedText.trim();
                    try {
                        const url = new URL(decodedText);
                        if (url.pathname.includes("/producto/")) {
                            codigo = url.pathname.split("/producto/")[1];
                        }
                    } catch(e) {}

                    if (!codigo) {
                        alert("❌ QR inválido");
                        escaneado = false;
                        return;
                    }

                    document.getElementById("codigoQR").value = codigo;
                    document.getElementById("qrForm").submit();

                    html5QrcodeScanner.stop()
                    .then(() => {
                        estadoScanner.textContent = "Escáner detenido";
                        console.log("Escáner detenido");
                    })
                    .catch(err => {
                        estadoScanner.textContent = "Error al detener escáner";
                        console.error("Error al detener escáner:", err);
                    });
                },
                (errorMessage) => {
                    // Aquí podrías mostrar errores leves, pero para debug los imprimiremos en consola
                    console.warn("Escaneo error:", errorMessage);
                }
            ).then(() => {
                estadoScanner.textContent = "✅ Escáner activo, apunta al QR";
                console.log("Escáner iniciado correctamente");
            }).catch(err => {
                estadoScanner.textContent = "❌ No se pudo activar el escáner";
                console.error("Error al iniciar escáner:", err);
            });
});
    </script>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
