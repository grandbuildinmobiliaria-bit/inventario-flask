<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .boton {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            font-size: 16px;
        }
        .boton:hover {
            background-color: #2980b9;
        }
        .acciones {
            text-align: center;
            margin-top: 20px;
        }
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>✏️ Editar Usuario</h1>

    <div class="card">
        <form method="POST">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" value="{{ usuario['username'] }}" required>

            <label for="password">Contraseña:</label>
            <input type="text" id="password" name="password" value="{{ usuario['password'] }}" required>

            <label for="rol">Rol:</label>
            <select id="rol" name="rol">
                <option value="admin" {% if usuario['rol']=='admin' %}selected{% endif %}>Admin</option>
                <option value="operador" {% if usuario['rol']=='operador' %}selected{% endif %}>Operador</option>
            </select>

            <button type="submit" class="boton">✅ Guardar cambios</button>
        </form>
    </div>

    <div class="acciones">
        <a href="{{ url_for('usuarios') }}">🔙 Volver a la lista de usuarios</a>
    </div>
</body>
</html>
