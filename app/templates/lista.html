<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de productos</title>
    <link rel="icon" href="{{ url_for('static', filename='mi_icono.ico') }}">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <style>
        body { font-family:"Segoe UI", Arial, sans-serif; background:#f4f6f8; padding:20px; }
        table { width:100%; border-collapse:collapse; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; }
        th { background:#3498db; color:#fff; }
        tr:hover { background:#f1f1f1; }
        .boton { background:#e74c3c; color:#fff; padding:6px 10px; border:none; border-radius:4px; cursor:pointer; text-decoration:none; }
        .boton:hover { background:#c0392b; }
    </style>
</head>
<body>
    <div class="page">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
      <button type="button" class="theme-toggle" data-theme-toggle></button>
    </div>
    <h1>Lista de productos</h1>
    <table>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Stock</th>
            <th>Ubicación</th>
            <th>Foto</th>
            <th>Acciones</th>
        </tr>
        {% for p in productos %}
        <tr>
            <td>{{ p['CODIGO'] }}</td>
            <td>{{ p['NOMBRE'] }}</td>
            <td>
                <form method="POST" action="{{ url_for('editar_stock_producto', codigo=p['CODIGO']) }}" style="display:flex; gap:6px; align-items:center; justify-content:center;">
                    <input type="number" name="stock" min="0" value="{{ p['STOCK'] }}" style="width:80px; margin:0;">
                    <button type="submit" class="boton" style="background:#16a085;">💾</button>
                </form>
            </td>
            <td>{{ p['UBICACION'] }}</td>
            <td>
                {% if p['foto_path'] %}
                <img src="{{ url_for('static', filename=p['foto_path']) }}" alt="Foto" style="max-width:60px;border-radius:6px;">
                {% else %}
                -
                {% endif %}
            </td>
            <td>
                <a href="{{ url_for('ver_producto', codigo=p['CODIGO']) }}" class="boton" style="background:#3498db;">👁 Ver</a>
                <a href="{{ url_for('borrar_producto', codigo=p['CODIGO']) }}" class="boton">🗑 Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>
     <div style="text-align:center; margin-top:20px;">
    <a href="{{ url_for('home') }}" 
       style="background:#3498db; color:#fff; padding:10px 16px; border-radius:6px; text-decoration:none; font-weight:bold;">
       🏠 Volver al inicio
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
